services:
  db:
    image: postgres:16-alpine
    container_name: mini-erp-db
    environment:
      POSTGRES_USER: erpuser
      POSTGRES_PASSWORD: erppass123
      POSTGRES_DB: mini_erp
    ports:
      - "5434:5432"
    volumes:
      - mini_erp_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erpuser -d mini_erp"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    container_name: mini-erp-api
    environment:
      DATABASE_URL: postgresql://erpuser:erppass123@db:5432/mini_erp?schema=public
      JWT_SECRET: mini-erp-jwt-secret-change-in-production
      JWT_EXPIRES_IN: 7d
      PORT: 4000
      CORS_ORIGIN: http://localhost:5173,http://localhost:4173
      NODE_ENV: production
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mini_erp_pg:
