# fly.toml - backend deploy config (no GitHub needed)
app = "mini-erp-crm-api"
primary_region = "sin"

[build]

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
